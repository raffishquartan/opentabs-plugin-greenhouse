# Weekly live-API canary. Runs the LIVE_API=1 smoke tests against the public
# `airbnb` board on Greenhouse to detect contract drift early.
#
# This workflow only sends GET requests to the public job-board API. No auth,
# no secrets. The tests assert structural properties (jobs.length > 0,
# title.length > 0, etc.) and will fail if Greenhouse changes the response
# shape - giving an Actions email within a week of any breakage.

name: live-api-canary

on:
  schedule:
    # 06:00 UTC every Monday
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Live-API smoke tests against airbnb
        env:
          LIVE_API: '1'
        run: npx vitest run src/api.live.test.ts
